name: vedaherb
description: "Offline-first AI for ASEAN Herbal Heritage. Bridging ancestral wisdom and modern safety via on-device LLM and Computer Vision to combat AMR and provide guidance in rural communities."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.11.1

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  envied: ^1.0.0                        # Makes sure our .env is hidden even when hackers decompiles our app!
  flutter_riverpod: ^3.3.1              # State management solution for Flutter, built on top of the Provider package.
  shared_preferences: ^2.2.2            # For storing simple key-value pairs persistently, such as user preferences or settings.
  go_router: ^14.0.0                    # A declarative routing package for Flutter that simplifies navigation and deep linking.
  image_picker: ^1.1.2                  # Capture / pick images for multimodal chat (Android-first).
  path_provider: ^2.1.5                 # Stable on-disk paths for persisting picked images across app restarts.
  restart_app: ^1.3.2                   # For programmatically restarting the app after clearing preferences.
  url_launcher: ^6.3.0                  # For moving to external apps such as phone app etc.
  llama_flutter_android: ^0.2.3         # Access the edge AI models.
  permission_handler: ^12.0.1           
  path_provider_android: ^2.3.1
  image_picker_android: ^0.8.13+16

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  envied_generator: ^1.0.0
  build_runner: ^2.4.0
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.14.0
  lints: ^6.1.0

# The following section is specific to Flutter Splash package. Used for splashscreen (different from loading screen).
flutter_native_splash:
  color: "#ffffff"
  image: assets/images/logo/logo.png

  color_dark: "#121212"
  image_dark: assets/images/logo/logo.png

  android_12:
    image: assets/images/logo/logo.png
    color: "#ffffff"
    image_dark: assets/images/logo/logo.png
    color_dark: "#121212"

# The following section is specific to Flutter Launcher Icons package. Used for app icon.
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/images/logo/logo.png"
  min_sdk_android: 21 # android_happy_version
  adaptive_icon_background: "#5fa268"
  adaptive_icon_foreground: "assets/images/logo/icon.png"

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
  - assets/images/logo/logo.png
  - assets/images/logo/icon.png
  - assets/images/illustrations/tutorial/tutorial_1-light.png
  - assets/images/illustrations/tutorial/tutorial_1-dark.png
  - assets/images/illustrations/tutorial/tutorial_2-light.png
  - assets/images/illustrations/tutorial/tutorial_2-dark.png
  - assets/images/illustrations/tutorial/tutorial_3-light.png
  - assets/images/illustrations/tutorial/tutorial_3-dark.png
  - assets/images/illustrations/states/empty-light.png
  - assets/images/illustrations/states/empty-dark.png
  
  fonts:
    - family: Onest
      fonts:
        - asset: assets/fonts/Onest/Onest-VariableFont_wght.ttf
          weight: 400
    - family: Funnel_Display
      fonts:
        - asset: assets/fonts/Funnel_Display/FunnelDisplay-VariableFont_wght.ttf
          weight: 200

